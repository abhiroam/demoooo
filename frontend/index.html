<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CausalTraj-EEG | Clinical Observer AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"primary":"#5dd6f3","primary-container":"#00687a","secondary":"#b8cacd","tertiary":"#66d9cc","error":"#ffb4ab","surface":"#111415","surface-dim":"#111415","surface-container-low":"#191c1d","surface-container":"#1d2021","surface-container-high":"#272a2b","surface-container-highest":"#323536","on-surface":"#e1e3e4","on-surface-variant":"#bfc8cd","outline":"#899297","outline-variant":"#3f484c","on-primary":"#003640","secondary-container":"#394a4c","on-secondary-container":"#a6b8bc","error-container":"#93000a","on-error-container":"#ffdad6","tertiary-container":"#006a62"},fontFamily:{headline:["Manrope"],body:["Inter"]}}}}</script>
<style>
body{font-family:'Inter',sans-serif;background:radial-gradient(circle at 60% 0%, #151e22 0%, #0d1011 100%);background-attachment:fixed;}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:-1;}

.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
.primary-glow{background:linear-gradient(135deg,#5dd6f3 0%,#00687a 100%);box-shadow:0 4px 15px rgba(93,214,243,0.25);transition:box-shadow 0.3s ease,transform 0.2s ease;}
.primary-glow:hover{box-shadow:0 6px 20px rgba(93,214,243,0.4);transform:translateY(-2px);}

.bg-surface-container-low {background:rgba(25, 28, 29, 0.55)!important;backdrop-filter:blur(12px)!important;-webkit-backdrop-filter:blur(12px)!important;border:1px solid rgba(255,255,255,0.05);box-shadow:0 8px 32px 0 rgba(0,0,0,0.25);}
.bg-surface-container-high {background:rgba(39, 42, 43, 0.45)!important;backdrop-filter:blur(8px)!important;border:1px solid rgba(255,255,255,0.03);}
aside.bg-surface-container-low{border-right:1px solid rgba(255,255,255,0.05);box-shadow:4px 0 24px rgba(0,0,0,0.3);}

.causal-grid{background-image:radial-gradient(circle at 1px 1px,rgba(93,214,243,0.15) 1px,transparent 0);background-size:30px 30px}
.wave-primary{stroke:#5dd6f3;stroke-width:1.5;fill:none}
.wave-secondary{stroke:#b8cacd;stroke-width:1;fill:none;opacity:.7}
.wave-tertiary{stroke:#66d9cc;stroke-width:1;fill:none}
#main-content{transition:all .4s cubic-bezier(0.16,1,0.3,1);transform-origin:top center;perspective:1000px}
.page-exit{opacity:0;transform:translateY(30px) rotateX(-10deg) scale(0.95)}
.page-enter{opacity:0;transform:translateY(-30px) rotateX(10deg) scale(0.95)}
.page-active{opacity:1;transform:translateY(0) rotateX(0) scale(1)}
.nav-btn{position:relative;overflow:hidden;transition:all 0.3s ease;}
.nav-btn::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,rgba(93,214,243,0.1),transparent);opacity:0;transition:opacity 0.3s;pointer-events:none;}
.nav-btn:hover::before{opacity:1;}
.nav-btn.active{color:#5dd6f3;background:linear-gradient(90deg,rgba(93,214,243,0.15) 0%,transparent 100%);border-left:3px solid #5dd6f3;border-right:none;font-weight:700}
.risk-high{color:#ffb4ab;background:rgba(255,180,171,.1)}
.risk-mid{color:#b8cacd;background:rgba(184,202,205,.1)}
.risk-low{color:#66d9cc;background:rgba(102,217,204,.1)}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse-dot 1.5s infinite}
@keyframes eeg-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.eeg-wave-anim{animation:eeg-scroll linear infinite;will-change:transform;}
@keyframes node-pulse{0%,100%{opacity:1;r:9}50%{opacity:.7;r:11}}
</style>
</head>
<body class="bg-surface text-on-surface">

<!-- Sidebar -->
<aside class="flex flex-col fixed left-0 top-0 h-screen w-64 bg-surface-container-low font-headline z-50">
  <div class="p-6">
    <div class="flex items-center gap-3 mb-10">
      <div class="w-10 h-10 rounded-xl bg-primary-container flex items-center justify-center">
        <span class="material-symbols-outlined text-primary">waves</span>
      </div>
      <div>
        <h1 class="text-xl font-bold text-on-surface">CausalTraj</h1>
        <p class="text-[10px] uppercase tracking-widest text-outline">Clinical Observer AI</p>
      </div>
    </div>
    <nav class="space-y-1">
      <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:text-on-surface hover:bg-surface-container-high transition-colors" id="btn-dashboard" onclick="switchTab('dashboard')"><span class="material-symbols-outlined">dashboard</span><span>Dashboard</span></button>
      <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:text-on-surface hover:bg-surface-container-high transition-colors" id="btn-live-eeg" onclick="switchTab('live-eeg')"><span class="material-symbols-outlined">waves</span><span>Live EEG</span></button>
      <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:text-on-surface hover:bg-surface-container-high transition-colors" id="btn-risk-analytics" onclick="switchTab('risk-analytics')"><span class="material-symbols-outlined">query_stats</span><span>Risk Analytics</span></button>
      <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:text-on-surface hover:bg-surface-container-high transition-colors" id="btn-causal-maps" onclick="switchTab('causal-maps')"><span class="material-symbols-outlined">account_tree</span><span>Causal Maps</span></button>
      <button class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:text-on-surface hover:bg-surface-container-high transition-colors" id="btn-model-training" onclick="switchTab('model-training')"><span class="material-symbols-outlined">psychology</span><span>Model Training</span></button>
    </nav>
  </div>
  <div class="mt-auto p-6 space-y-1">
    <button onclick="runDemo()" class="w-full primary-glow text-on-primary font-bold py-3 px-4 rounded-xl mb-4 flex items-center justify-center gap-2 active:scale-95 transition-transform">
      <span class="material-symbols-outlined">play_arrow</span><span>Run Demo</span>
    </button>
    <div id="sidebar-status" class="text-[10px] text-outline text-center py-2">Checking connection...</div>
  </div>
</aside>

<!-- Header -->
<header class="flex items-center justify-between px-6 sticky top-0 z-40 ml-64 bg-surface/80 backdrop-blur-md w-[calc(100%-16rem)] h-16">
  <div class="flex items-center gap-4">
    <span class="text-lg font-black text-primary font-headline" id="header-title">CausalTraj-EEG</span>
    <div id="mode-badge" class="hidden px-2 py-1 rounded-full text-[10px] font-bold bg-error-container text-on-error-container">DEMO MODE</div>
  </div>
  <div class="flex items-center gap-4">
    <div id="status-dot" class="flex items-center gap-2 px-3 py-1 bg-tertiary/10 text-tertiary rounded-full text-xs font-bold">
      <span class="w-2 h-2 rounded-full bg-tertiary pulse"></span>Online
    </div>
    <span class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:text-primary transition-colors">notifications</span>
  </div>
</header>

<!-- Main -->
<main class="ml-64 p-8 min-h-[calc(100vh-128px)]" id="main-content"></main>

<!-- Footer -->
<footer class="flex justify-between items-center px-8 ml-64 w-[calc(100%-16rem)] bg-surface py-4 border-t border-outline-variant/10 text-[10px] uppercase tracking-widest text-outline-variant">
  <span>v2.4.0-Alpha | Data: CHB-MIT / TUH Database</span>
  <div class="flex gap-6">
    <a class="hover:text-on-surface transition-colors" href="#">Documentation</a>
    <a class="hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
    <a class="hover:text-on-surface transition-colors" href="/docs" target="_blank">API Docs</a>
  </div>
</footer>

<script>
const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:8000'
  : '';  // On Render: same-origin, so relative paths work automatically
let lastResult = null;
let systemStatus = null;

// ── API helpers ────────────────────────────────────────────────────────────
async function apiFetch(path){
  try { const r=await fetch(API+path); return await r.json(); }
  catch(e){ return null; }
}

// ── Boot ──────────────────────────────────────────────────────────────────
async function boot(){
  systemStatus = await apiFetch('/api/status');
  const sb = document.getElementById('sidebar-status');
  const badge = document.getElementById('mode-badge');
  if(!systemStatus){
    sb.textContent='⚠ API offline - check server';
    sb.classList.add('text-error');
    return;
  }
  if(systemStatus.demo_mode){
    sb.textContent='Demo mode active';
    badge.classList.remove('hidden');
  } else {
    sb.textContent=`Model loaded · ${systemStatus.device}`;
    sb.classList.add('text-tertiary');
  }
  switchTab('dashboard');
}

async function runDemo(){
  const result = await apiFetch('/api/demo?n_samples=16');
  if(result){ lastResult=result; switchTab('risk-analytics'); }
}

// ── Render helpers ───────────────────────────────────────────────────────
function riskColor(r){ return r>0.65?'text-error':r>0.35?'text-secondary':'text-tertiary'; }
function riskBg(r){ return r>0.65?'border-error bg-error/5':r>0.35?'border-secondary bg-secondary/5':'border-tertiary bg-tertiary/5'; }
function riskLabel(r){ return r>0.65?'SEIZURE':r>0.35?'PRE-ICTAL':'STABLE'; }

function renderBandBars(bands){
  const colors={delta:'bg-primary',theta:'bg-secondary',alpha:'bg-tertiary',beta:'bg-primary/60',gamma:'bg-tertiary/60'};
  return Object.entries(bands).map(([name,val])=>`
    <div class="flex items-center gap-3">
      <div class="w-12 text-[10px] font-bold text-outline uppercase">${name}</div>
      <div class="flex-1 bg-surface-container-high h-2 rounded-full overflow-hidden">
        <div class="${colors[name]||'bg-primary'} h-full rounded-full transition-all duration-700" style="width:${(val*100).toFixed(1)}%"></div>
      </div>
      <div class="w-10 text-[10px] font-mono text-on-surface-variant text-right">${(val*100).toFixed(1)}%</div>
    </div>`).join('');
}

function renderRiskSVG(scores, lower, upper, labels){
  if(!scores || scores.length < 2) return '<div class="flex items-center justify-center h-full text-outline text-sm">No risk data yet — run an analysis first.</div>';
  const N=scores.length, W=700, H=200, PAD=36;
  const gw=W-PAD*2, gh=H-PAD*2-16;
  const x=i=>(PAD+i*(gw/(N-1))).toFixed(1);
  const y=v=>(PAD+gh*(1-v)).toFixed(1);

  let areaPath=`M${x(0)} ${y(upper[0])}`;
  for(let i=1;i<N;i++) areaPath+=` L${x(i)} ${y(upper[i])}`;
  for(let i=N-1;i>=0;i--) areaPath+=` L${x(i)} ${y(lower[i])}`;
  areaPath+=' Z';

  let linePath=`M${x(0)} ${y(scores[0])}`;
  for(let i=1;i<N;i++) linePath+=` L${x(i)} ${y(scores[i])}`;

  let gtPath='';
  if(labels&&labels.length===N){
    gtPath=`<polyline points="${labels.map((l,i)=>`${x(i)},${y(l===2?0.9:l===1?0.5:0.1)}`).join(' ')}" fill="none" stroke="#ffb4ab" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>`;
  }

  // Grid lines
  const gridLines=[0.25,0.5,0.75,1.0].map(v=>`
    <line x1="${PAD}" y1="${y(v)}" x2="${W-PAD}" y2="${y(v)}" stroke="#3f484c" stroke-width="0.5" opacity="0.4"/>
    <text x="${PAD-6}" y="${parseFloat(y(v))+4}" fill="#899297" font-size="9" text-anchor="end">${(v*100).toFixed(0)}%</text>`).join('');

  // X-axis sample labels (show up to 8 evenly spaced)
  const step=Math.max(1,Math.floor(N/8));
  const xLabels=scores.map((_,i)=>i%step===0||i===N-1?`<text x="${x(i)}" y="${parseFloat(y(0))+20}" fill="#899297" font-size="8" text-anchor="middle">S${i+1}</text>`:'').join('');
  const xAxis=`<line x1="${PAD}" y1="${y(0)}" x2="${W-PAD}" y2="${y(0)}" stroke="#3f484c" stroke-width="0.8" opacity="0.5"/>`;

  const dots=scores.map((s,i)=>`<circle cx="${x(i)}" cy="${y(s)}" r="3.5" fill="#5dd6f3" stroke="#111415" stroke-width="1.5"/>`).join('');

  return `<svg viewBox="0 0 ${W} ${H}" class="w-full h-full">
    ${gridLines}
    ${xAxis}${xLabels}
    <path d="${areaPath}" fill="#5dd6f3" opacity="0.1"/>
    ${gtPath}
    <path d="${linePath}" fill="none" stroke="#5dd6f3" stroke-width="2"/>
    ${dots}
  </svg>`;
}

function renderTrajectory(traj){
  if(!traj||!traj.length) return '';
  const numChannels = traj[0].length || 1;
  const N=traj.length;
  // Generate real dynamic wavy lines that look like the input graph
  let html = '<div class="divide-y divide-outline-variant/10 w-full">';
  // Take top 4 or fewer channels for visual clarity
  const displayChs = Math.min(6, numChannels);
  const colors = ['#5dd6f3', '#b8cacd', '#66d9cc', '#5dd6f3', '#b8cacd', '#66d9cc'];
  const durs = [3.2, 2.8, 3.6, 2.5, 3.0, 2.3];
  
  for(let c=0; c<displayChs; c++) {
    // Generate SVG pts directly from trajectory data, repeating it to allow scrolling
    // Normalize data slightly to fit in the 32px height box comfortably
    const meanV = traj.reduce((s,t)=>s+(t[c]||0),0)/N;
    const stdV = Math.max(0.01, Math.sqrt(traj.reduce((s,t)=>s+Math.pow((t[c]||0)-meanV,2),0)/N));
    
    // Create smoothly animated points
    let pts = '';
    let pts2 = '';
    const numPts = Math.min(N, 80); // downsample if too long
    const step = N / numPts;
    
    for(let k=0; k<numPts; k++) {
      let idx = Math.floor(k * step);
      let val = traj[idx][c] || 0;
      // Map value: standardized (val - meanV) / stdV * scale + offset
      let scaled = 16 + ((val - meanV) / stdV) * 6; // 6 is visual amplitude
      pts += `${k*(960/numPts)},${scaled} `;
      pts2 += `${k*(960/numPts) + 960},${scaled} `;
    }
    
    html += `
    <div class="px-2 py-2 flex items-center gap-4">
      <span class="text-[10px] font-bold w-4" style="color:${colors[c]}">Ch${c+1}</span>
      <div class="flex-1 h-8 overflow-hidden relative rounded">
        <svg class="absolute left-0 top-0 h-full" style="width:200%;animation:eeg-scroll ${durs[c]}s linear infinite;" viewBox="0 0 1920 32" preserveAspectRatio="none">
          <polyline points="${pts}" fill="none" stroke="${colors[c]}" stroke-width="1.2" opacity="0.9"/>
          <polyline points="${pts2}" fill="none" stroke="${colors[c]}" stroke-width="1.2" opacity="0.9"/>
        </svg>
      </div>
    </div>`;
  }
  html += '</div>';
  return html;
}

// ── Screens ───────────────────────────────────────────────────────────────
const screens = {

  // ── DASHBOARD ───────────────────────────────────────────────────────────
  dashboard:{
    title:'Executive Overview',
    render: async ()=>{
      const status = systemStatus || await apiFetch('/api/status') || {};
      const info   = await apiFetch('/api/model/info') || {};
      const demo   = await apiFetch('/api/demo?n_samples=6') || {mean_risk:0,band_contributions:{},driver_channels:[]};
      const mr     = demo.mean_risk||0;
      const ckpt   = info.checkpoint||{};
      return `
      <section class="mb-10 flex justify-between items-end">
        <div>
          <h2 class="text-3xl font-headline font-extrabold tracking-tight text-on-surface mb-2">Executive Overview</h2>
          <p class="text-on-surface-variant font-body">Real-time causal discovery and risk assessment across distributed EEG nodes.</p>
        </div>
        <div class="flex gap-4">
          <div class="p-4 bg-surface-container-low rounded-xl flex items-center gap-4">
            <div class="text-right">
              <p class="text-[10px] uppercase tracking-widest text-outline">System Mode</p>
              <p class="text-xl font-headline font-bold ${status.demo_mode?'text-error':'text-primary'}">${status.demo_mode?'Demo Mode':'Live Inference'}</p>
            </div>
            <span class="material-symbols-outlined ${status.demo_mode?'text-error':'text-primary'}">${status.demo_mode?'science':'memory'}</span>
          </div>
        </div>
      </section>

      <div class="grid grid-cols-12 gap-6 mb-6">
        <div class="col-span-12 lg:col-span-8 bg-surface-container-low rounded-xl p-6">
          <div class="flex justify-between items-start mb-8">
            <h3 class="font-headline font-bold text-lg">Pipeline Architecture</h3>
            <span class="px-3 py-1 rounded-full text-[10px] font-bold bg-secondary-container text-on-secondary-container uppercase">P2 → P3 → P4 → P5</span>
          </div>
          <div class="flex items-center justify-between relative px-4">
            ${['CNN','GAT','Transformer','Classifier'].map((name,i)=>`
            <div class="flex flex-col items-center gap-2 z-10">
              <div class="w-14 h-14 rounded-full ${i===0?'primary-glow':'bg-surface-container-high border-2 border-primary/30'} flex items-center justify-center">
                <span class="material-symbols-outlined ${i===0?'text-on-primary':'text-primary'}">${['blur_on','hub','psychology','analytics'][i]}</span>
              </div>
              <span class="text-[10px] font-bold uppercase ${i===0?'text-primary':'text-outline'}">P${i+2} ${name}</span>
            </div>
            ${i<3?'<div class="flex-grow h-[2px] bg-gradient-to-r from-outline-variant/20 via-primary/40 to-outline-variant/20 mx-2"></div>':''}`).join('')}
          </div>
          <div class="mt-8 grid grid-cols-4 gap-4 border-t border-outline-variant/10 pt-6">
            <div><p class="text-[10px] uppercase text-outline mb-1">Input Shape</p><p class="text-sm font-headline font-bold">[S,10,16,25]</p></div>
            <div><p class="text-[10px] uppercase text-outline mb-1">Classes</p><p class="text-sm font-headline font-bold">3 (I/P/S)</p></div>
            <div><p class="text-[10px] uppercase text-outline mb-1">Best AUC</p><p class="text-sm font-headline font-bold text-primary">${ckpt.val_auc?ckpt.val_auc.toFixed(3):'N/A'}</p></div>
            <div><p class="text-[10px] uppercase text-outline mb-1">Best F1</p><p class="text-sm font-headline font-bold text-tertiary">${ckpt.val_f1?ckpt.val_f1.toFixed(3):'N/A'}</p></div>
          </div>
        </div>
        <div class="col-span-12 lg:col-span-4 space-y-4">
          <div class="bg-surface-container-low rounded-xl p-5 border-l-4 border-primary">
            <p class="text-[10px] uppercase tracking-widest text-primary font-bold mb-1">Current Risk Score</p>
            <p class="text-4xl font-headline font-black ${riskColor(mr)}">${(mr*100).toFixed(1)}<span class="text-xl text-outline-variant">%</span></p>
            <p class="text-xs text-on-surface-variant mt-2">${riskLabel(mr)} · ${demo.prediction_label||'N/A'}</p>
          </div>
          <div class="bg-surface-container-low rounded-xl p-5 border-l-4 border-secondary">
            <p class="text-[10px] uppercase tracking-widest text-secondary font-bold mb-1">Model Status</p>
            <p class="text-sm font-bold ${status.model_loaded?'text-tertiary':'text-error'}">${status.model_loaded?'✓ Loaded':'⚠ Demo Mode'}</p>
            <p class="text-[10px] text-outline mt-1">${status.device||'N/A'}</p>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-12 gap-6">
        <div class="col-span-12 lg:col-span-8">
          <h3 class="font-headline font-bold text-xl mb-4">Band Contributions</h3>
          <div class="bg-surface-container-low rounded-xl p-6 space-y-4">
            ${renderBandBars(demo.band_contributions||{})}
          </div>
        </div>
        <div class="col-span-12 lg:col-span-4">
          <h3 class="font-headline font-bold text-xl mb-4">System Alerts</h3>
          <div class="bg-surface-container-low rounded-xl p-6 space-y-3">
            <div class="p-3 rounded-lg bg-surface-container-high border-l-2 ${mr>0.65?'border-error':'border-primary'}">
              <p class="text-xs font-bold">${mr>0.65?'⚠ High Risk Detected':'System Normal'}</p>
              <p class="text-[10px] text-on-surface-variant">Mean risk: ${(mr*100).toFixed(1)}% · ${riskLabel(mr)}</p>
            </div>
            <div class="p-3 rounded-lg bg-surface-container-high border-l-2 border-secondary">
              <p class="text-xs font-bold">Driver Channels</p>
              <p class="text-[10px] text-on-surface-variant">${(demo.driver_channels||[]).join(', ')||'N/A'}</p>
            </div>
            <div class="p-3 rounded-lg bg-surface-container-high border-l-2 border-tertiary">
              <p class="text-xs font-bold">API Connected</p>
              <p class="text-[10px] text-on-surface-variant">${API}</p>
            </div>
          </div>
        </div>
      </div>`;
    }
  },

  // ── LIVE EEG ────────────────────────────────────────────────────────────
  'live-eeg':{
    title:'Live EEG Upload',
    render: async ()=>`
    <div class="grid grid-cols-12 gap-8">
      <section class="col-span-12 lg:col-span-8 space-y-6">
        <div>
          <h2 class="text-2xl font-headline font-extrabold tracking-tight">EEG Analysis Upload</h2>
          <p class="text-sm text-outline mt-1">Upload your preprocessed graph .npy files to run the full pipeline</p>
        </div>
        <div class="bg-surface-container-low rounded-2xl p-8">
          <div class="flex gap-4 mb-6 border-b border-outline-variant/20 pb-4">
            <button type="button" class="text-sm font-bold border-b-2 border-primary text-primary transition-colors hover:text-primary pb-2 -mb-[18px]" onclick="window.switchUploadTab('raw')" id="tab-raw">Raw EEG (.edf)</button>

          </div>

  // ── CAUSAL MAPS ────────────────────────────────────────────────────────
  'causal-maps':{
    title:'Causal Discovery',
    render: async ()=>{
      let data = lastResult;
      if(!data){ data = await apiFetch('/api/demo?n_samples=12'); lastResult=data; }
      const drivers = data?.driver_channels||[];
      // Fixed 16-node layout: all standard bipolar electrode positions in a 500x320 space
      const ALL_NODES=['FP1','FP2','F7','F8','F3','F4','T3','T4','C3','C4','T5','T6','P3','P4','O1','O2'];
      const NODE_POS={
        FP1:{x:160,y:40},FP2:{x:340,y:40},
        F7:{x:80,y:100},F3:{x:200,y:100},F4:{x:300,y:100},F8:{x:420,y:100},
        T3:{x:50,y:180},C3:{x:175,y:180},C4:{x:325,y:180},T4:{x:450,y:180},
        T5:{x:80,y:260},P3:{x:200,y:260},P4:{x:300,y:260},T6:{x:420,y:260},
        O1:{x:160,y:320},O2:{x:340,y:320}
      };
      const nodeSet=new Set(drivers.flatMap(p=>p.split('-')));
      const visibleNodes=ALL_NODES.filter(n=>NODE_POS[n]);

      return `
      <div class="mb-8">
        <p class="text-primary font-headline font-bold text-sm tracking-widest uppercase mb-2">Stages 3-4: GAT + Transformer</p>
        <h2 class="text-4xl font-headline font-extrabold tracking-tight">Causal EEG Maps</h2>
      </div>
      <div class="grid grid-cols-12 gap-6">
        <section class="col-span-12 lg:col-span-8 bg-surface-container-low rounded-2xl overflow-hidden causal-grid min-h-[420px] relative">
          <div class="absolute top-6 left-6 z-10">
            <h3 class="font-headline font-bold text-lg">Channel Connectivity</h3>
            <div class="flex gap-2 mt-1 flex-wrap">${drivers.map(d=>`<span class="px-2 py-0.5 bg-primary/10 text-primary text-[10px] font-bold rounded">${d}</span>`).join('')||'<span class="text-[10px] text-outline">Run analysis to see driver channels</span>'}</div>
          </div>
          <div class="flex items-center justify-center w-full h-full min-h-[420px] py-8">
            <svg viewBox="-20 10 540 340" class="w-full max-h-96">
              <defs>
                <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                  <path d="M0,0 L0,6 L6,3 z" fill="#5dd6f3" opacity="0.7"/>
                </marker>
              </defs>
              ${drivers.map(pair=>{
                const [a,b]=pair.split('-');
                const na=NODE_POS[a],nb=NODE_POS[b];
                if(!na||!nb) return '';
                const mx=(na.x+nb.x)/2,my=(na.y+nb.y)/2-20;
                return `<path d="M${na.x},${na.y} Q${mx},${my} ${nb.x},${nb.y}" fill="none" stroke="#5dd6f3" stroke-width="2" opacity="0.65" stroke-dasharray="6 3" marker-end="url(#arrow)"/>`;
              }).join('')}
              ${visibleNodes.map(n=>{
                const pos=NODE_POS[n];
                const isDriver=nodeSet.has(n);
                return `<g>
                  <circle cx="${pos.x}" cy="${pos.y}" r="${isDriver?11:7}" fill="${isDriver?'#5dd6f3':'#1d2021'}" stroke="${isDriver?'#5dd6f3':'#3f484c'}" stroke-width="${isDriver?2:1.5}" ${isDriver?'filter="url(#glow)" opacity="0.95"':'opacity="0.8"'}/>
                  <text x="${pos.x}" y="${pos.y+4}" fill="${isDriver?'#003640':'#899297'}" font-size="7.5" text-anchor="middle" font-family="Inter" font-weight="bold">${n}</text>
                </g>`;
              }).join('')}
            </svg>
          </div>
        </section>

        <section class="col-span-12 lg:col-span-4 bg-surface-container-low rounded-2xl p-6 space-y-6">
          <h3 class="font-headline font-bold text-lg">Calibration</h3>
          <div class="bg-surface-container p-4 rounded-xl">
            <label class="text-[10px] font-bold text-outline uppercase block mb-3">Detection Threshold</label>
            <input type="range" value="65" class="w-full accent-primary cursor-pointer"/>
            <div class="flex justify-between mt-2 text-[10px] text-primary"><span>Conservative</span><span>0.65 (default)</span></div>
          </div>
          <div class="bg-surface-container p-4 rounded-xl">
            <h4 class="text-sm font-bold mb-3">Risk Distribution</h4>
            ${(()=>{
              const scores=data?.risk_scores||[];
              const low=scores.filter(s=>s<=0.35).length;
              const mid=scores.filter(s=>s>0.35&&s<=0.65).length;
              const hi=scores.filter(s=>s>0.65).length;
              const total=scores.length||1;
              return `<div class="space-y-2">
                <div class="flex justify-between text-xs"><span class="text-tertiary">Interictal</span><span>${low} (${(low/total*100).toFixed(0)}%)</span></div>
                <div class="flex justify-between text-xs"><span class="text-secondary">Pre-ictal</span><span>${mid} (${(mid/total*100).toFixed(0)}%)</span></div>
                <div class="flex justify-between text-xs"><span class="text-error">Seizure</span><span>${hi} (${(hi/total*100).toFixed(0)}%)</span></div>
              </div>`;
            })()}
          </div>
          <div class="bg-gradient-to-br from-primary-container/20 to-surface-container-low rounded-2xl p-5 border border-primary/10">
            <h4 class="text-sm font-bold mb-2">Bipolar Pairs</h4>
            <p class="text-xs text-on-surface-variant leading-relaxed">16 standard bipolar pairs monitored across temporal, frontal, and occipital chains.</p>
          </div>
        </section>
      </div>`;
    }
  },

  // ── MODEL TRAINING ────────────────────────────────────────────────────
  'model-training':{
    title:'Model Training & Registry',
    render: async ()=>{
      const hist = await apiFetch('/api/training/history') || {available:false,history:[]};
      const info = await apiFetch('/api/model/info') || {};
      const history = hist.history||[];
      const lastEpoch = history[history.length-1]||{};

      let chartSVG = '';
      if(history.length>1){
        const f1s=history.map(h=>h.val_f1||0);
        const losses=history.map(h=>h.val_loss||0);
        const N=f1s.length, W=500, H=140, P=25;
        const gw=W-P*2, gh=H-P*2;
        const maxLoss=Math.max(...losses,0.01);
        const x=i=>(P+i*(gw/(N-1))).toFixed(1);
        const yf=v=>(P+gh*(1-v)).toFixed(1);
        const yl=v=>(P+gh*(1-v/maxLoss)).toFixed(1);
        const f1path=`M${x(0)} ${yf(f1s[0])} ${f1s.map((_,i)=>i?`L${x(i)} ${yf(f1s[i])}`:'').join(' ')}`;
        const losspath=`M${x(0)} ${yl(losses[0])} ${losses.map((_,i)=>i?`L${x(i)} ${yl(losses[i])}`:'').join(' ')}`;
        chartSVG=`<svg viewBox="0 0 ${W} ${H}" class="w-full">
          ${[0.25,0.5,0.75,1.0].map(v=>`<line x1="${P}" y1="${yf(v)}" x2="${W-P}" y2="${yf(v)}" stroke="#3f484c" stroke-width="0.5" opacity="0.4"/>`).join('')}
          <path d="${f1path}" fill="none" stroke="#5dd6f3" stroke-width="2"/>
          <path d="${losspath}" fill="none" stroke="#ffb4ab" stroke-width="1.5" stroke-dasharray="4 2"/>
        </svg>`;
      }

      return `
      <section class="mb-8">
        <h2 class="text-3xl font-headline font-extrabold tracking-tight mb-2">Model Registry</h2>
        <p class="text-on-surface-variant">Manage training runs, monitor metrics, evaluate checkpoints.</p>
      </section>

      <div class="grid grid-cols-12 gap-6 mb-6">
        <div class="col-span-12 lg:col-span-8 bg-surface-container-low rounded-xl p-6">
          <div class="flex justify-between items-start mb-6">
            <div>
              <span class="px-2 py-0.5 rounded bg-primary/10 text-primary text-[10px] font-bold uppercase border border-primary/20">${hist.available?'History Loaded':'No History'}</span>
              <h3 class="font-headline text-xl font-bold mt-2">Training Metrics</h3>
            </div>
            <div class="text-right">
              <p class="text-[10px] uppercase text-outline">${hist.available?`Epoch ${hist.n_epochs}`:'Run train.py first'}</p>
              <p class="text-xl font-headline font-bold text-primary">${lastEpoch.val_f1?(lastEpoch.val_f1*100).toFixed(1)+'% F1':'N/A'}</p>
            </div>
          </div>
          ${hist.available&&history.length>1?`
          <div class="h-36 mb-4">${chartSVG}</div>
          <div class="flex gap-6 text-[10px] text-outline">
            <span class="flex items-center gap-1"><span class="w-4 h-0.5 bg-primary inline-block"></span>Val F1</span>
            <span class="flex items-center gap-1"><span class="w-4 h-0.5 border-t border-dashed border-error inline-block"></span>Val Loss</span>
          </div>
          `:`
          <div class="h-36 flex items-center justify-center bg-surface-container-lowest rounded-xl border border-outline-variant/10">
            <div class="text-center">
              <span class="material-symbols-outlined text-outline text-3xl">bar_chart</span>
              <p class="text-xs text-outline mt-2">No training history. Run <span class="font-mono text-primary">train.py</span> to generate.</p>
            </div>
          </div>`}

          <div class="grid grid-cols-4 gap-4 mt-6 pt-6 border-t border-outline-variant/10">
            ${[['Val F1',lastEpoch.val_f1?.toFixed(4)||'N/A','text-primary'],['Val AUC',lastEpoch.val_auc?.toFixed(4)||'N/A','text-tertiary'],['Sensitivity',lastEpoch.val_sens?.toFixed(4)||'N/A','text-secondary'],['Specificity',lastEpoch.val_spec?.toFixed(4)||'N/A','text-on-surface']].map(([l,v,c])=>`
            <div><p class="text-[10px] uppercase text-outline mb-1">${l}</p><p class="text-xl font-headline font-bold ${c}">${v}</p></div>`).join('')}
          </div>

// ── Tab switching ─────────────────────────────────────────────────────────
async function switchTab(id){
  const mc=document.getElementById('main-content');
  const ht=document.getElementById('header-title');
  const sc=screens[id]; if(!sc) return;

  // 3D Exit Transition
  mc.classList.remove('page-active', 'page-enter');
  mc.classList.add('page-exit');

  setTimeout(async()=>{
    mc.innerHTML='<div class="flex items-center justify-center h-64"><div class="text-outline text-sm animate-pulse">Computing Causal Graph...</div></div>';
    mc.classList.remove('page-exit');
    mc.classList.add('page-enter');
    
    // Give browser a frame to apply the transform starting point
    await new Promise(r => requestAnimationFrame(r));
    
    const html=await sc.render();
    mc.innerHTML=html;
    ht.textContent=sc.title;

    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('btn-'+id)?.classList.add('active');
    window.scrollTo(0,0);
    
    // 3D Enter Transition
    requestAnimationFrame(()=>{
      mc.classList.remove('page-enter');
      mc.classList.add('page-active');
    });
  }, 400); // Wait for exit animation to complete
}

window.handleAnalyzeUpload = async function(e){
  e.preventDefault();
  const btn=e.target.querySelector('[type=submit]');
  btn.textContent='Analyzing...';btn.disabled=true;
  
  const fd=new FormData();
  let url = API+'/api/analyze';
  const draw = document.getElementById('upload-raw');
  const isRaw = draw && !draw.classList.contains('hidden');
  
  if (isRaw) {
    const ef=document.getElementById('edf-file').files[0];
    if(!ef) { alert('Please select an EDF file.'); btn.innerHTML='<span class="material-symbols-outlined">rocket_launch</span>Run Analysis';btn.disabled=false;return; }
    fd.append('edf_file', ef);
    url = API+'/api/analyze-raw';
  } else {
    const nf=document.getElementById('nodes-file').files[0];
    const af=document.getElementById('adj-file').files[0];
    if(!nf||!af){alert('Please select nodes and adj files.');btn.innerHTML='<span class="material-symbols-outlined">rocket_launch</span>Run Analysis';btn.disabled=false;return;}
    fd.append('nodes_file',nf);fd.append('adj_file',af);
    const lf=document.getElementById('labels-file').files[0];
    if(lf) fd.append('labels_file',lf);
  }
  
  try{
    const r=await fetch(url,{method:'POST',body:fd});
    const data=await r.json();
    if(r.ok){ window.lastResult=data; window.showEEGResult(data); }
    else { document.getElementById('upload-result').innerHTML='<p class="text-error text-sm">Error: '+data.detail+'</p>'; document.getElementById('upload-result').classList.remove('hidden'); }
  }catch(err){
    document.getElementById('upload-result').innerHTML='<p class="text-error text-sm">Connection error. Is the server running?</p>';
    document.getElementById('upload-result').classList.remove('hidden');
  }
  btn.innerHTML='<span class="material-symbols-outlined">rocket_launch</span>Run Analysis';btn.disabled=false;
};

window.showEEGResult = function(data){
  const panel=document.getElementById('eeg-result-panel');
  const content=document.getElementById('eeg-result-content');
  if (content && panel) {
    content.innerHTML='<p class="text-xs"><span class="text-outline">Prediction:</span> <span class="font-bold text-on-surface">'+data.prediction_label+'</span></p><p class="text-xs mt-1"><span class="text-outline">Mean Risk:</span> <span class="font-bold">'+(data.mean_risk*100).toFixed(1)+'%</span></p><p class="text-xs mt-1"><span class="text-outline">Samples:</span> '+data.n_samples+'</p>';
    panel.classList.remove('hidden');
  }
  // ── Animate sidebar frequency band bars with real input data ──
  if (data.band_contributions) {
    const bands = data.band_contributions;
    ['delta','theta','alpha','beta','gamma'].forEach(name => {
      const bar = document.getElementById(`eeg-band-${name}`);
      const txt = document.getElementById(`eeg-band-${name}-txt`);
      const pct = (bands[name] * 100).toFixed(1);
      if (bar) bar.style.width = pct + '%';
      if (txt) txt.textContent = pct + '%';
    });
  }
  if (data.input_signals && data.input_signals.length > 0) {
    const container = document.getElementById('live-eeg-preview-container');
    if (container) {
       const renderHtml = window.renderInputEEG(data.input_signals);
       if(renderHtml !== null) {
          container.innerHTML = renderHtml;
       }
    }
  }
};

window.morphSVGPolyline = function(elem, newPointsStr) {
  if (!elem) return;
  const oldPts = (elem.getAttribute('points') || '').trim().split(/\s+/).map(p => {
    let [x,y] = p.split(',').map(Number); return [x||0, y||0];
  });
  const newPts = newPointsStr.trim().split(/\s+/).map(p => {
    let [x,y] = p.split(',').map(Number); return [x||0, y||0];
  });
  
  if(oldPts.length === 0 || oldPts.length !== newPts.length || oldPts[0][1] === undefined || isNaN(oldPts[0][1])) {
    elem.setAttribute('points', newPointsStr);
    return;
  }
  const frames = 45; // Smooth animation over 45 frames
  let frame = 0;
  function animate() {
     frame++;
     const t = frame / frames;
     const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; // easeInOutCubic
     let morphed = '';
     for(let i=0; i<newPts.length; i++) {
        let x = newPts[i][0];
        let y = oldPts[i][1] + (newPts[i][1] - oldPts[i][1]) * ease;
        morphed += `${x},${y} `;
     }
     elem.setAttribute('points', morphed.trim());
     if (frame < frames) requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
};

window.renderInputEEG = function(signals) {
  // Try to mould existing elements first
  let canMorph = true;
  for(let i=0; i<6; i++) {
    if(!document.getElementById(`live-eeg-p1-${i}`)) canMorph = false;
  }
  
  const channels = ['FP1', 'FP2', 'C3', 'C4', 'T3', 'T5'];
  const colors = ['#5dd6f3', '#b8cacd', '#66d9cc', '#5dd6f3', '#b8cacd', '#66d9cc'];
  const durs = [3.2, 2.8, 3.6, 2.5, 3.0, 2.3];

  if(canMorph) {
    signals.forEach((sig, i) => {
      if(i >= 6 || sig.length === 0) return;
      const len = sig.length;
      const meanV = sig.reduce((a,b)=>a+b,0)/len;
      const stdV = Math.max(0.01, Math.sqrt(sig.reduce((a,b)=>a+Math.pow(b-meanV,2),0)/len));
      let pts = '', pts2 = '';
      const numPts = Math.min(len, 80);
      const step = len / numPts;
      for(let k=0; k<numPts; k++) {
        let val = sig[Math.floor(k * step)] || 0;
        let scaled = 16 + ((val - meanV) / stdV) * 8;
        pts += `${k*(960/numPts)},${scaled} `;
        pts2 += `${k*(960/numPts) + 960},${scaled} `;
      }
      window.morphSVGPolyline(document.getElementById(`live-eeg-p1-${i}`), pts);
      window.morphSVGPolyline(document.getElementById(`live-eeg-p2-${i}`), pts2);
    });
    return null; // Signals morphed, no new HTML string to inject
  }

  // Fallback to initial render
  let html = '';
  signals.forEach((sig, i) => {
    if(i >= 6 || sig.length === 0) return;
    const len = sig.length;
    const meanV = sig.reduce((a,b)=>a+b,0)/len;
    const stdV = Math.max(0.01, Math.sqrt(sig.reduce((a,b)=>a+Math.pow(b-meanV,2),0)/len));
    let pts = '', pts2 = '';
    const numPts = Math.min(len, 80);
    const step = len / numPts;
    for(let k=0; k<numPts; k++) {
      let val = sig[Math.floor(k * step)] || 0;
      let scaled = 16 + ((val - meanV) / stdV) * 8;
      pts += `${k*(960/numPts)},${scaled} `;
      pts2 += `${k*(960/numPts) + 960},${scaled} `;
    }

    html += `<div class="px-6 py-2.5 flex items-center gap-4">
      <span class="text-[10px] font-bold w-8" style="color:${colors[i]}">${channels[i]||('Ch'+(i+1))}</span>
      <div class="flex-1 h-9 overflow-hidden relative">
        <svg class="absolute left-0 top-0 h-full" style="width:200%;animation:eeg-scroll ${durs[i]}s linear infinite;" viewBox="0 0 1920 32" preserveAspectRatio="none">
          <polyline id="live-eeg-p1-${i}" points="${pts}" fill="none" stroke="${colors[i]}" stroke-width="1.2" opacity="0.9"/>
          <polyline id="live-eeg-p2-${i}" points="${pts2}" fill="none" stroke="${colors[i]}" stroke-width="1.2" opacity="0.9"/>
        </svg>
      </div>
      <span class="text-[10px] text-outline-variant font-mono w-14 text-right">Extracted</span>
    </div>`;
  });
  return html;
};

window.submitFeedback = async function(label) {
  const statusEl = document.getElementById('hitl-status');

  // label = -1 means "Confirm Correct" — no training needed, just UI ack
  if (label === -1) {
    if (statusEl) {
      statusEl.className = 'mt-3 p-3 rounded-xl bg-tertiary/10 border border-tertiary/30 text-tertiary text-xs font-bold flex items-center gap-2';
      statusEl.innerHTML = '<span class="material-symbols-outlined text-base">verified</span> Confirmed. Model prediction logged as correct.';
      statusEl.classList.remove('hidden');
    }
    return;
  }

  const labelNames = {0: 'Stable', 1: 'Pre-ictal', 2: 'Seizure'};
  const labelColors = {0: 'text-on-surface-variant border-outline-variant/30 bg-surface-container-high', 1: 'text-secondary border-secondary/30 bg-secondary/10', 2: 'text-error border-error/30 bg-error/10'};

  if (statusEl) {
    statusEl.className = `mt-3 p-3 rounded-xl border ${labelColors[label]} text-xs font-bold flex items-center gap-2`;
    statusEl.innerHTML = `<span class="material-symbols-outlined text-base animate-spin" style="animation:spin 1s linear infinite">autorenew</span> Updating neural weights for "${labelNames[label]}"...`;
    statusEl.classList.remove('hidden');
  }

  try {
    const r = await fetch(API + '/api/feedback', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({correct_label: label})
    });
    const data = await r.json();

    if (r.ok) {
      if (statusEl) {
        statusEl.innerHTML = `<span class="material-symbols-outlined text-base">model_training</span> 
          Model updated! Learned "${labelNames[label]}". Loss: ${data.loss?.toFixed(4) ?? 'N/A'}`;
      }
      // Pulse the HITL panel to visualise the update
      const panel = document.getElementById('hitl-panel');
      if (panel) {
        panel.style.transition = 'box-shadow 0.3s ease';
        panel.style.boxShadow = label===2 ? '0 0 20px rgba(255,180,171,0.4)' : label===1 ? '0 0 20px rgba(184,202,205,0.4)' : '0 0 20px rgba(102,217,204,0.4)';
        setTimeout(() => { panel.style.boxShadow = ''; }, 1800);
      }
    } else {
      if (statusEl) {
        statusEl.className = 'mt-3 p-3 rounded-xl bg-error/10 border border-error/30 text-error text-xs font-bold flex items-center gap-2';
        statusEl.innerHTML = `<span class="material-symbols-outlined text-base">error</span> Error: ${data.detail || 'Unknown error'}`;
      }
    }
  } catch(err) {
    if (statusEl) {
      statusEl.className = 'mt-3 p-3 rounded-xl bg-error/10 border border-error/30 text-error text-xs font-bold flex items-center gap-2';
      statusEl.innerHTML = '<span class="material-symbols-outlined text-base">wifi_off</span> Connection error. Is the server running?';
    }
  }
};
